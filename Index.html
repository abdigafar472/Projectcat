<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>

body{
font-family: Arial;
background-color:#f2f2f2;
}

.container{
width:420px;
margin:auto;
border:2px solid black;
padding:20px;
background:white;
}

h2{
text-align:center;
}

label{
display:inline-block;
width:130px;
}

input,select{
padding:5px;
}

button{
padding:6px 12px;
margin-top:10px;
}

.logo{
text-align:center;
margin-bottom:15px;
}

</style>

<script>

function validateForm(){

let name=document.forms["regForm"]["name"].value;
let email=document.forms["regForm"]["email"].value;

if(name=="" || email==""){
alert("Please enter Name and Email");
return false;
}

}

</script>

</head>

<body>

<div class="container">

<!-- PEN LOGO IN A CIRCLE -->
<div class="logo">

<svg width="100" height="100">

<!-- Circle -->
<circle cx="50" cy="50" r="40" fill="lightblue" stroke="black" stroke-width="2"/>

<!-- Pen body -->
<rect x="30" y="48" width="30" height="6" fill="blue"/>

<!-- Pen tip -->
<polygon points="60,48 75,51 60,54" fill="gold"/>

<!-- Pen back -->
<rect x="20" y="48" width="10" height="6" fill="black"/>

</svg>

</div>

<h2>Student Registration Form</h2>

<form name="regForm" onsubmit="return validateForm()">

<label>Name:</label>
<input type="text" name="name">
<br><br>

<label>Email Address:</label>
<input type="email" name="email">
<br><br>

<label>Date of Birth:</label>
<input type="date" name="dob">
<br><br>

<label>Gender:</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<label>Hobbies:</label>
<input type="checkbox"> Reading
<input type="checkbox"> Sports
<input type="checkbox"> Music
<br><br>

<label>Main Course:</label>

<select>

<option>IT</option>
<option>Computer Science</option>
<option>Business IT</option>
<option>Data Science</option>

</select>

<br><br>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</form>

</div>

<!-- SQL DATABASE STRUCTURE

CREATE DATABASE student_registration;

USE student_registration;

CREATE TABLE students(

name VARCHAR(100),
email VARCHAR(100),
date_of_birth DATE,
gender VARCHAR(10),
hobbies VARCHAR(100),
course VARCHAR(50)
);

Example Insert:

INSERT INTO students
(name,email,date_of_birth,gender,hobbies,course)

VALUES
('John Doe','john@gmail.com','2002-05-12','Male','Reading','IT');

-->

</body>
</html>
